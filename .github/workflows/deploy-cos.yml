name: Deploy to Tencent COS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config \
            -a ${{ secrets.TENCENT_SECRET_ID }} \
            -s ${{ secrets.TENCENT_SECRET_KEY }} \
            -b grwz-1305217687 \
            -r ap-guangzhou

      - name: Upload to COS
        run: coscmd upload -r dist/ / --delete --yes || true
